# registry 校验:PR 涉及 registry 时校验结构与引用;合入 main 后自动重新生成依赖图
name: registry-check
on:
  pull_request:
    paths: ["registry/**", "scripts/registry-*.py"]
  push:
    branches: [main]
    paths: ["registry/**"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install pyyaml
      - name: Validate registry
        run: python3 scripts/registry-check.py
  regen-graph:
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - run: pip install pyyaml
      - name: Regenerate dependency graph
        run: |
          python3 scripts/registry-graph.py
          if ! git diff --quiet docs/service-graph.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/service-graph.md
            git commit -m "docs: regenerate service graph [skip ci]"
            git push
          fi
